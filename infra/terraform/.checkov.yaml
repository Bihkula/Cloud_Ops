# Checkov config for the Cirrus infra.
#
# Everything below is a CONSCIOUS tradeoff for a learning/dev stack that gets
# torn down daily. Each skip is a decision on record — flip these ON for a real
# production deployment. Anything NOT listed here must still pass.
#
# Run:  checkov -d . --config-file .checkov.yaml

framework:
  - terraform

skip-check:
  # --- Cost: customer-managed KMS keys ($1/mo/key + usage). AES256 / AWS-managed keys are fine for learning.
  - CKV_AWS_136   # ECR encrypted with KMS CMK
  - CKV_AWS_145   # S3 encrypted with KMS CMK
  - CKV_AWS_149   # Secrets Manager secret encrypted with KMS CMK

  # --- Cost / not needed at this scale
  - CKV_AWS_18    # S3 access logging (needs a dedicated log bucket)
  - CKV_AWS_144   # S3 cross-region replication (doubles storage cost)
  - CKV2_AWS_62   # S3 event notifications (no consumer in this project)
  - CKV_AWS_353   # RDS Performance Insights (extra cost)
  - CKV_AWS_118   # RDS enhanced monitoring (extra CloudWatch cost)
  - CKV2_AWS_11   # VPC flow logs (CloudWatch/S3 data cost; enable for prod audit)
  - CKV2_AWS_30   # Postgres query logging via parameter group (noise + cost for dev)

  # --- Auth model: this stack uses a password from Secrets Manager, not IAM DB auth / rotation Lambdas.
  - CKV_AWS_161   # RDS IAM authentication
  - CKV2_AWS_57   # Secrets Manager automatic rotation (needs a rotation Lambda)

  # --- Teardown-friendly on purpose (this is a disposable learning env)
  - CKV_AWS_293   # RDS deletion protection (would block `terraform destroy`)

  # --- Intended by the architecture, not a mistake
  - CKV_AWS_130   # Public subnets auto-assign public IPs — required for the public (ALB/NAT) tier
  - CKV_AWS_382   # Egress 0.0.0.0/0 — the app/ALB need outbound (image pulls, updates) via NAT
  - CKV2_AWS_5    # "SG not attached" — the ALB/app SGs are attached later by the ALB and Kops nodes
